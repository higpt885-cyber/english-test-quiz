    To: All Staff
    From: Facilities Management
    Date: June 12
    Subject: Office Relocation

    We are writing to confirm that the relocation to our new downtown office will take place on the weekend of July 20th. (11) _______, the current building will be closed starting from Friday afternoon at 2 PM. We understand that this may cause some inconvenience, but we are confident that the new facility will provide a much better working environment.

    To ensure a smooth transition, we have (12) _______ a professional moving company to handle the transport of all office furniture and equipment. (13) _______. Please label your personal boxes clearly with your name and new cubicle number. We look forward to (14) _______ you in our new space.
  question: "Q11: Choose the best connector."
  options:
    - "On the contrary"
    - "Consequently"
    - "In summary"
    - "Nevertheless"
  answer: 1
  explanation: "【邏輯銜接】前文說搬家，後文說要關閉舊大樓，為因果關係，選 Consequently (因此)。"


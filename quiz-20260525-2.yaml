- id: 1
  part: 5
  type: "Grammar"
  question: "The consultant strongly recommended that the company ______ its security protocols before the end of the fiscal year."
  options:
    - "updates"
    - "update"
    - "updated"
    - "will update"
  answer: 1
  explanation: "【虛擬語氣】在表示建議的動詞 recommend 之後的 that 子句中，動詞必須使用原形動詞（省略了 should），故選 (B) update。"

- id: 2
  part: 5
  type: "Vocab"
  question: "The board members approved the proposed budget after a ______ review of the department's financial performance."
  options:
    - "casual"
    - "superficial"
    - "painstaking"
    - "nominal"
  answer: 2
  explanation: "【高階字彙】Painstaking 意為「極其細心的、辛苦的、一絲不苟的」，相當於 meticulous。語境指董事會經過嚴謹細緻的審查後批准了預算。"

- id: 3
  part: 5
  type: "Grammar"
  question: "Seldom ______ such an outstanding level of dedication from a newly appointed sales representative."
  options:
    - "we have witnessed"
    - "have we witnessed"
    - "we witnessed"
    - "did we witnessed"
  answer: 1
  explanation: "【否定倒裝句】當否定副詞 Seldom（極少）放在句首時，主要子句必須進行倒裝（助動詞提前），結構為：否定副詞 + have/has + 主詞 + V-ed。"

- id: 4
  part: 5
  type: "Vocab"
  question: "To ______ the integration of the two databases, the IT team scheduled a maintenance window on Sunday night."
  options:
    - "facilitate"
    - "complicate"
    - "postpone"
    - "ascertain"
  answer: 0
  explanation: "【商務動詞】Facilitate 意為「促進、使便利」。語境指為了讓兩大資料庫的整合更加順暢而安排維護時間。"

- id: 5
  part: 5
  type: "Prep"
  question: "The marketing department successfully launched the new campaign ______ the unexpected delay in product shipment."
  options:
    - "although"
    - "notwithstanding"
    - "even if"
    - "because of"
  answer: 1
  explanation: "【高階介係詞】Notwithstanding 意為「儘管、雖然」，是介係詞，後接名詞短語（the unexpected delay）。Although 與 Even if 均為連接詞，後方需接子句。"

- id: 6
  part: 5
  type: "Grammar"
  question: "______ the committee been informed of the supply shortages earlier, they would have postponed the project launch."
  options:
    - "If"
    - "Should"
    - "Had"
    - "Were"
  answer: 2
  explanation: "【假設法倒裝】此句為與過去事實相反的假設倒裝，原句為 'If the committee had been informed...'，省略 If 後將 Had 提前至句首。"

- id: 7
  part: 5
  type: "Vocab"
  question: "The software is designed to be fully ______ with all major cloud platforms, including AWS and Azure."
  options:
    - "compatible"
    - "comparable"
    - "complacent"
    - "competent"
  answer: 0
  explanation: "【商務搭配】Compatible 意為「相容的」，常用於形容軟體與作業系統或雲端平台的相容性，且與 with 搭配。"

- id: 8
  part: 5
  type: "Grammar"
  question: "We are seeking a senior architect ______ exceptional design portfolio demonstrates a deep understanding of sustainable building practices."
  options:
    - "who"
    - "whom"
    - "whose"
    - "which"
  answer: 2
  explanation: "// 關係代名詞所有格 whose 在此指代「該位建築師的」設計作品集。"

- id: 9
  part: 5
  type: "Vocab"
  question: "All business-related travel expenses must be submitted to the finance department for ______ within thirty days."
  options:
    - "reimbursement"
    - "transaction"
    - "deduction"
    - "subsidy"
  answer: 0
  explanation: "【商務名詞】Reimbursement 意為「核銷、費用報銷」。指將差旅代墊費用向公司申請核退。"

- id: 10
  part: 5
  type: "Vocab"
  question: "At yesterday's summit, the newly appointed chief executive ______ outlined her strategic plan for global expansion."
  options:
    - "eloquent"
    - "eloquence"
    - "eloquently"
    - "elocution"
  answer: 2
  explanation: "【副詞修飾動詞】此處需要副詞 eloquently（有說服力地、口才流利地）來修飾過去式動詞 outlined。"


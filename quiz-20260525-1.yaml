- id: 1
  part: 5
  type: "Vocab"
  question: "The legal department issued a _______ statement regarding the unauthorized use of the company's trademarked logos."
  options:
    - "superficial"
    - "categorical"
    - "vague"
    - "precarious"
  answer: 1
  explanation: "【商務詞彙】Categorical 意為「絕對的、明確的、不留餘地的」。語境指法律部門發出明確且嚴正的聲明。"

- id: 2
  part: 5
  type: "Grammar"
  question: "The director suggested that the annual budget _______ to account for the fluctuating exchange rates in the international market."
  options:
    - "adjusts"
    - "be adjusted"
    - "is adjusting"
    - "had adjusted"
  answer: 1
  explanation: "【虛擬語氣】在 suggest (建議) 之後的 that 子句需使用原形動詞（省略 should），且預算應是被調整，故選 be adjusted。"

- id: 3
  part: 5
  type: "Vocab"
  question: "The new residential complex was designed to _______ the natural landscape rather than disrupt it."
  options:
    - "compliment"
    - "complement"
    - "compromise"
    - "complicate"
  answer: 1
  explanation: "【易混淆字】Complement 是「相輔相成、補充」。Compliment 則是「讚美」。此處指建築與景觀相得益彰。"

- id: 4
  part: 5
  type: "Grammar"
  question: "_______ the CEO had anticipated the market crash, she would have liquidated the company's riskier assets much earlier."
  options:
    - "Should"
    - "Were"
    - "Had"
    - "If"
  answer: 2
  explanation: "【假設法倒裝】If she had anticipated... 的倒裝形式為 Had she anticipated...。主句用 would have liquidated 表示與過去事實相反。"

- id: 5
  part: 5
  type: "Vocab"
  question: "The research team’s findings were _______ enough to secure a multi-million dollar grant from the government."
  options:
    - "compelling"
    - "compulsory"
    - "compensatory"
    - "complacent"
  answer: 0
  explanation: "【商務詞彙】Compelling 意為「令人信服的、有說服力的」。語境指研究結果很有力，因此獲得撥款。"

- id: 6
  part: 5
  type: "Grammar"
  question: "The company plans to expand its operations into Eastern Europe, _______ that the current political situation remains stable."
  options:
    - "provided"
    - "unless"
    - "even though"
    - "nevertheless"
  answer: 0
  explanation: "【條件連接詞】Provided (that) 意為「假如、在...條件下」。語境指在政治穩定前提下才會擴張。"

- id: 7
  part: 5
  type: "Vocab"
  question: "The merger was initially met with skepticism, but it has since proved to be a _______ move for both organizations."
  options:
    - "scanty"
    - "stagnant"
    - "shrewd"
    - "spontaneous"
  answer: 2
  explanation: "【職場詞彙】Shrewd 意為「精明的、明智的」。語境指雖然最初有疑慮，但事後證明是精明的舉措。"

- id: 8
  part: 5
  type: "Grammar"
  question: "Rarely _______ any single employee shown such a high level of dedication to the company's core values."
  options:
    - "is"
    - "has"
    - "did"
    - "had"
  answer: 1
  explanation: "【倒裝句】否定副詞 Rarely 放在句首引導倒裝。主詞是 single employee，且語意指到目前為止的經驗，用現在完成式 has。"

- id: 9
  part: 5
  type: "Vocab"
  question: "The technical manual is so _______ written that even non-experts can understand the complex assembly process."
  options:
    - "lucidly"
    - "ludicrously"
    - "languidly"
    - "loftily"
  answer: 0
  explanation: "【修飾副詞】Lucidly 意為「清晰地、明瞭地」。語境指手冊寫得極其清晰。"

- id: 10
  part: 5
  type: "Prep"
  question: "The board members expressed their unwavering support for the new CEO _______ the recent drop in stock prices."
  options:
    - "notwithstanding"
    - "in light of"
    - "rather than"
    - "as opposed to"
  answer: 0
  explanation: "【高階介係詞】Notwithstanding 意為「儘管」。語意指儘管股價下跌，董事會仍支持 CEO。"


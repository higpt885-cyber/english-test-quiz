    <b>Global Logistics Crisis: Ports at Capacity</b><br><br>
    Recent disruptions in global maritime routes have led to an unprecedented backlog at major shipping hubs. Industry analysts point to a combination of labor shortages and a sudden surge in consumer electronics imports as the primary catalysts for the current delays.<br><br>
    The Port of Antwerp-Bruges, the second-largest in Europe, reported that the average berthing delay for container vessels has increased from 24 hours to 72 hours over the last month. For retail giants, this means that seasonal stock originally intended for June arrival may not hit shelves until late August. "We are seeing a ripple effect that touches every node of the supply chain," said Marcus Vane, a senior logistical consultant. "Until throughput efficiency improves at the source ports, secondary distribution centers will continue to operate under duress."
  question: "Q15: What is mentioned as a cause of the shipping hub backlog?"
  options:
    - "A decrease in oil prices"
    - "An increase in electronics imports"
    - "A major earthquake in Europe"
    - "A reduction in port taxes"
  answer: 1
  explanation: "【細節定位】第一段提到 'surge in consumer electronics imports'。"


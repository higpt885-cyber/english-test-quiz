- id: 20
  part: 7
  type: "Double Passage"
  passage: |
    <b>[Product Delivery Notice]</b>
    Invoice #90123
    Customer: Apex Retailers
    Dispatched Date: May 10
    Expected Delivery: May 14
    Courier: FastTrack Logistics

    <b>[Urgent Email from Customer]</b>
    Date: May 16
    To: Customer Service, FastTrack Logistics
    From: Shipping Manager, Apex Retailers
    Subject: Missing Shipment (Invoice #90123)

    Dear Support Team,
    We are writing to report that our shipment (Invoice #90123), which was scheduled to arrive at our warehouse on May 14, has not yet delivered. Our retail promotional event is scheduled to launch on May 19, and the items in this shipment are critical for this event.

    According to the tracking portal, the shipment has been delayed at the Springfield sorting facility due to severe weather conditions. Given the urgency, could you expedite this package so it arrives by May 18? If that is not possible, we will need to arrange for local pickup.
  question: "Q20: When was the shipment originally expected to arrive?"
  options:
    - "May 10"
    - "May 14"
    - "May 16"
    - "May 19"
  answer: 1
  explanation: "【定位題】第一篇發票的 Expected Delivery 及第二篇信件中均提到原訂送達日為 May 14。"

- id: 21
  part: 7
  type: "Double Passage"
  passage: |
    (同前文內容)
  question: "Q21: Who is the recipient of the shipment?"
  options:
    - "FastTrack Logistics"
    - "Apex Retailers"
    - "Springfield Sorting"
    - "Customer Service"
  answer: 1
  explanation: "【主體判定】發票中的 Customer 是 Apex Retailers，寄信人也是該公司的 Shipping Manager，故其為收件人。"

